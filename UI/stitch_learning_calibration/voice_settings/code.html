<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "primary": "#135bec",
                "background-light": "#f6f6f8",
                "background-dark": "#101622",
              },
              fontFamily: {
                "display": ["Lexend", "sans-serif"]
              },
              borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
            },
          },
        }
    </script>
<title>Voice Settings</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<div class="relative flex h-auto min-h-screen w-full flex-col max-w-md mx-auto bg-white dark:bg-slate-900 shadow-xl overflow-x-hidden">
<!-- TopAppBar -->
<div class="flex items-center bg-white dark:bg-slate-900 p-4 pb-2 justify-between sticky top-0 z-10 border-b border-slate-100 dark:border-slate-800">
<div class="text-slate-900 dark:text-slate-100 flex size-10 shrink-0 items-center justify-center cursor-pointer hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight flex-1 ml-4">Voice Settings</h2>
<div class="text-slate-900 dark:text-slate-100 flex size-10 shrink-0 items-center justify-center cursor-pointer hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full transition-colors">
<span class="material-symbols-outlined">more_vert</span>
</div>
</div>
<div class="p-4 space-y-8">
<!-- Voice Profile Section -->
<section>
<div class="flex items-center gap-2 mb-4">
<span class="material-symbols-outlined text-primary">record_voice_over</span>
<h3 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight">Voice Profile</h3>
</div>
<div class="flex h-12 w-full items-center justify-center rounded-xl bg-slate-100 dark:bg-slate-800 p-1.5">
<label class="flex cursor-pointer h-full grow items-center justify-center overflow-hidden rounded-lg px-2 has-[:checked]:bg-white dark:has-[:checked]:bg-slate-700 has-[:checked]:shadow-sm has-[:checked]:text-primary text-slate-500 dark:text-slate-400 text-sm font-semibold transition-all">
<span class="truncate">Male</span>
<input class="invisible w-0" name="voice_gender" type="radio" value="Male"/>
</label>
<label class="flex cursor-pointer h-full grow items-center justify-center overflow-hidden rounded-lg px-2 has-[:checked]:bg-white dark:has-[:checked]:bg-slate-700 has-[:checked]:shadow-sm has-[:checked]:text-primary text-slate-500 dark:text-slate-400 text-sm font-semibold transition-all">
<span class="truncate">Female</span>
<input checked="" class="invisible w-0" name="voice_gender" type="radio" value="Female"/>
</label>
<label class="flex cursor-pointer h-full grow items-center justify-center overflow-hidden rounded-lg px-2 has-[:checked]:bg-white dark:has-[:checked]:bg-slate-700 has-[:checked]:shadow-sm has-[:checked]:text-primary text-slate-500 dark:text-slate-400 text-sm font-semibold transition-all">
<span class="truncate">Non-binary</span>
<input class="invisible w-0" name="voice_gender" type="radio" value="Non-binary"/>
</label>
</div>
</section>
<!-- Speech Speed Section -->
<section>
<div class="flex items-center justify-between mb-2">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary">speed</span>
<h3 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight">Speech Speed</h3>
</div>
<span class="text-primary font-bold text-sm bg-primary/10 px-2 py-1 rounded-lg">1.25x</span>
</div>
<div class="relative flex w-full flex-col items-start justify-between gap-3 py-4">
<div class="flex h-6 w-full items-center gap-4">
<div class="flex h-1.5 flex-1 rounded-full bg-slate-200 dark:bg-slate-700">
<div class="h-full w-[65%] rounded-full bg-primary relative">
<div class="absolute -right-2 -top-1.5 size-4.5 w-4 h-4 rounded-full bg-primary border-2 border-white dark:border-slate-900 shadow-md"></div>
</div>
</div>
</div>
<div class="flex w-full justify-between text-xs text-slate-400 font-medium">
<span>0.5x</span>
<span>1.0x (Normal)</span>
<span>2.0x</span>
</div>
</div>
</section>
<!-- Pitch Section -->
<section>
<div class="flex items-center justify-between mb-2">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary">graphic_eq</span>
<h3 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight">Voice Pitch</h3>
</div>
<span class="text-primary font-bold text-sm bg-primary/10 px-2 py-1 rounded-lg">Medium</span>
</div>
<div class="relative flex w-full flex-col items-start justify-between gap-3 py-4">
<div class="flex h-6 w-full items-center gap-4">
<div class="flex h-1.5 flex-1 rounded-full bg-slate-200 dark:bg-slate-700">
<div class="h-full w-[50%] rounded-full bg-primary relative">
<div class="absolute -right-2 -top-1.5 size-4.5 w-4 h-4 rounded-full bg-primary border-2 border-white dark:border-slate-900 shadow-md"></div>
</div>
</div>
</div>
<div class="flex w-full justify-between text-xs text-slate-400 font-medium">
<span>Low</span>
<span>Neutral</span>
<span>High</span>
</div>
</div>
</section>
<!-- Advanced Toggle -->
<div class="flex items-center justify-between p-4 bg-slate-50 dark:bg-slate-800/50 rounded-xl border border-slate-100 dark:border-slate-800">
<div class="flex flex-col">
<span class="text-sm font-bold text-slate-900 dark:text-slate-100">Natural Inflection</span>
<span class="text-xs text-slate-500">Enable AI-driven emotional range</span>
</div>
<div class="relative inline-flex items-center cursor-pointer">
<div class="w-11 h-6 bg-primary rounded-full"></div>
<div class="absolute left-6 top-1 bg-white w-4 h-4 rounded-full transition-transform"></div>
</div>
</div>
</div>
<!-- Sticky Footer with Test Button -->
<div class="mt-auto p-4 pb-8 space-y-4 bg-white dark:bg-slate-900 border-t border-slate-100 dark:border-slate-800">
<button class="w-full flex items-center justify-center gap-2 py-4 px-6 bg-primary text-white font-bold rounded-xl hover:bg-primary/90 transition-all shadow-lg shadow-primary/20">
<span class="material-symbols-outlined">play_circle</span>
                Test Voice
            </button>
<button class="w-full flex items-center justify-center py-3 px-6 text-primary font-semibold border-2 border-primary/20 rounded-xl hover:bg-primary/5 transition-all">
                Save Changes
            </button>
</div>
<!-- Sample Audio Visualization -->
<div class="px-4 pb-4">
<div class="flex items-end justify-center gap-1 h-8 opacity-40">
<div class="w-1 bg-primary rounded-full h-3"></div>
<div class="w-1 bg-primary rounded-full h-5"></div>
<div class="w-1 bg-primary rounded-full h-8"></div>
<div class="w-1 bg-primary rounded-full h-6"></div>
<div class="w-1 bg-primary rounded-full h-4"></div>
<div class="w-1 bg-primary rounded-full h-7"></div>
<div class="w-1 bg-primary rounded-full h-5"></div>
<div class="w-1 bg-primary rounded-full h-3"></div>
<div class="w-1 bg-primary rounded-full h-6"></div>
<div class="w-1 bg-primary rounded-full h-8"></div>
<div class="w-1 bg-primary rounded-full h-4"></div>
<div class="w-1 bg-primary rounded-full h-2"></div>
</div>
</div>
</div>
</body></html>
