<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sign Translator - Real-time</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#135bec",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Lexend", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Lexend', sans-serif;
        }
        .camera-feed {
            background: linear-gradient(to bottom, rgba(0,0,0,0.1), rgba(0,0,0,0.4)), url('https://images.unsplash.com/photo-1534528741775-53994a69daeb?q=80&w=1964&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display">
<div class="relative flex h-screen w-full flex-col overflow-hidden">
<!-- Top Navigation Bar -->
<div class="absolute top-0 left-0 right-0 z-20 flex items-center justify-between p-4 bg-gradient-to-b from-black/60 to-transparent">
<button class="text-white p-2 hover:bg-white/10 rounded-full transition-colors">
<span class="material-symbols-outlined text-2xl">menu</span>
</button>
<h1 class="text-white text-lg font-bold tracking-tight">Sign Translator</h1>
<button class="text-white p-2 hover:bg-white/10 rounded-full transition-colors">
<span class="material-symbols-outlined text-2xl">account_circle</span>
</button>
</div>
<!-- Full Screen Camera Feed Mockup -->
<div class="flex-1 camera-feed relative" data-alt="Full screen camera view showing a person's hands performing sign language">
<!-- Focus Brackets Overlay -->
<div class="absolute inset-0 flex items-center justify-center pointer-events-none">
<div class="w-64 h-64 border-2 border-white/30 rounded-xl relative">
<div class="absolute -top-1 -left-1 w-6 h-6 border-t-4 border-l-4 border-primary rounded-tl-lg"></div>
<div class="absolute -top-1 -right-1 w-6 h-6 border-t-4 border-r-4 border-primary rounded-tr-lg"></div>
<div class="absolute -bottom-1 -left-1 w-6 h-6 border-b-4 border-l-4 border-primary rounded-bl-lg"></div>
<div class="absolute -bottom-1 -right-1 w-6 h-6 border-b-4 border-r-4 border-primary rounded-br-lg"></div>
</div>
</div>
<!-- Quick Action Buttons -->
<div class="absolute top-20 right-4 flex flex-col gap-4">
<button class="flex items-center justify-center rounded-full size-12 bg-black/40 text-white backdrop-blur-md border border-white/20 hover:bg-black/60 transition-all">
<span class="material-symbols-outlined">flash_on</span>
</button>
<button class="flex items-center justify-center rounded-full size-12 bg-black/40 text-white backdrop-blur-md border border-white/20 hover:bg-black/60 transition-all">
<span class="material-symbols-outlined">flip_camera_ios</span>
</button>
<button class="flex items-center justify-center rounded-full size-12 bg-black/40 text-white backdrop-blur-md border border-white/20 hover:bg-black/60 transition-all">
<span class="material-symbols-outlined">auto_fix_high</span>
</button>
</div>
</div>
<!-- Bottom Interface Container -->
<div class="absolute bottom-0 left-0 right-0 z-30">
<!-- Translation Overlay Box -->
<div class="px-4 pb-4">
<div class="flex flex-col gap-4 rounded-xl border border-white/20 bg-white/90 dark:bg-slate-900/90 backdrop-blur-xl p-5 shadow-2xl">
<div class="flex items-center justify-between">
<span class="text-primary text-xs font-bold uppercase tracking-widest">Live Translation</span>
<div class="flex gap-2">
<span class="flex h-2 w-2 rounded-full bg-red-500 animate-pulse"></span>
</div>
</div>
<div class="flex flex-col gap-2 min-h-[80px]">
<p class="text-slate-900 dark:text-slate-100 text-2xl font-semibold leading-tight">
                            "Hello, I am looking for the nearest train station."
                        </p>
<p class="text-slate-500 dark:text-slate-400 text-sm italic">
                            Confidence: 98%
                        </p>
</div>
<div class="flex items-center gap-3">
<button class="flex-1 flex items-center justify-center gap-2 rounded-lg h-14 bg-primary text-white text-lg font-bold shadow-lg shadow-primary/30 hover:bg-primary/90 active:scale-95 transition-all">
<span class="material-symbols-outlined">volume_up</span>
<span>Speak</span>
</button>
<button class="flex items-center justify-center rounded-lg size-14 bg-slate-200 dark:bg-slate-800 text-slate-700 dark:text-slate-200 hover:bg-slate-300 dark:hover:bg-slate-700 transition-colors">
<span class="material-symbols-outlined">content_copy</span>
</button>
</div>
</div>
</div>
<!-- Bottom Navigation Bar -->
<div class="flex gap-2 border-t border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-950 px-4 pb-6 pt-3 shadow-inner">
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-primary" href="#">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined text-[28px] fill-1">home</span>
</div>
<p class="text-xs font-medium tracking-tight">Home</p>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-500 dark:text-slate-400 hover:text-primary transition-colors" href="#">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined text-[28px]">history</span>
</div>
<p class="text-xs font-medium tracking-tight">History</p>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-500 dark:text-slate-400 hover:text-primary transition-colors" href="#">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined text-[28px]">school</span>
</div>
<p class="text-xs font-medium tracking-tight">Learn</p>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-500 dark:text-slate-400 hover:text-primary transition-colors" href="#">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined text-[28px]">settings</span>
</div>
<p class="text-xs font-medium tracking-tight">Settings</p>
</a>
</div>
</div>
<!-- Recording Indicator (Floating) -->
<div class="absolute top-1/2 left-4 -translate-y-1/2 flex flex-col items-center gap-2">
<div class="w-1 h-32 bg-white/20 rounded-full overflow-hidden relative">
<div class="absolute bottom-0 w-full bg-primary/80 rounded-full" style="height: 65%;"></div>
</div>
<span class="text-[10px] font-bold text-white/70 vertical-text uppercase tracking-widest" style="writing-mode: vertical-rl;">Signal</span>
</div>
</div>
</body></html>
